<title>NeoFind</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}
.container {
    text-align: center;
    margin-top: 80px;
}
input, select, textarea {
    width: 80%;
    padding: 15px;
    border-radius: 25px;
    border: none;
    font-size: 18px;
    margin-bottom: 10px;
}
.result {
    background: rgba(255,255,255,0.1);
    margin: 10px auto;
    padding: 15px;
    border-radius: 15px;
    width: 80%;
    text-align: left;
}
.result a {
    color: #4da6ff;
    font-size: 20px;
    text-decoration: none;
}
button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

#consoleBox {
    display:none;
    position:fixed;
    top:10%;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    height:60%;
    background:#111;
    border-radius:15px;
    padding:10px;
    z-index:9999;
}

#consoleLogs {
    height:80%;
    overflow:auto;
    font-size:14px;
    text-align:left;
}

#consoleInput {
    width:100%;
    margin-top:10px;
}

</style>
</head>
<body>

<div class="container">
    <h1>NeoFind 🔍</h1>

    <select id="langSelect">
        <option value="en" selected>EN</option>
        <option value="pl">PL</option>
        <option value="easter">Easter 🐰</option>
    </select>

    <input type="text" id="search" placeholder="Search...">
    <div id="results"></div>
</div>

<!-- CONSOLE -->

<div id="consoleBox">
    <div style="display:flex; justify-content:space-between;">
        <h3>🧠 Debug Console</h3>
        <button onclick="closeConsole()">❌</button>
    </div>

    <div id="consoleLogs"></div>

    <input id="consoleInput" placeholder="Enter command..." onkeydown="handleCommand(event)">
</div>

<!-- ⚙️ SETTINGS -->
<button onclick="openSettings()" style="position:fixed; bottom:70px; right:20px;">⚙️</button>

<div id="settingsBox" style="display:none; text-align:center;">
    <h3>⚙️ Settings</h3>

    <label>Language:</label><br>
    <select id="settingsLang">
        <option value="en">EN</option>
        <option value="pl">PL</option>
        <option value="easter">🐰</option>
    </select><br><br>
   
<!-- ADMIN -->
    <div id="adminBox" style="display:none; position:fixed; top:10%; left:50%; transform:translateX(-50%); width:80%; background:#111; padding:20px; border-radius:15px; z-index:9999; text-align:center;">

    <h2>🔐 Admin Panel</h2>

    <input id="adminPassword" placeholder="Password"><br><br>
    <button onclick="loginAdmin()">Login</button>

    <div id="adminContent" style="display:none; margin-top:20px;">
        <h3>➕ Add result</h3>

        <input id="adminTitle" placeholder="Title"><br>
        <input id="adminDesc" placeholder="Description"><br>
        <input id="adminLink" placeholder="Link"><br><br>

        <button onclick="addResult()">Add</button><br><br>

        <button onclick="closeAdmin()">❌ Close</button>
    </div>
</div>

    <h4>📜 History</h4>
    <div id="historyList"></div><br>

    <button onclick="clearHistory()">🧹 Clear history</button><br><br>
    <button onclick="openConsole()">🪲 Debug Console</button><br><br>
    <button onclick="saveSettings()">Save</button>
</div>

<!-- ADMIN -->
<button id="adminBtn" onclick="openAdmin()" style="position:fixed; bottom:20px; right:20px;">🔐 Admin</button>

<!-- REPORT -->
<button id="reportBtn" onclick="openReport()" style="position:fixed; bottom:20px; left:20px;">⚠️ Report problem</button>

// 🔍 SEARCH + HISTORY
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toLowerCase().trim();
    log('searched "' + value + '"');
    saveToHistory(value);

    const results = document.getElementById("results");

    if(value === "neo"){
        spawnNeo();
        return;
    }

    if(!value){
        results.innerHTML = "";
        return;
    }

    const list = data[currentLang] || [];

    const filtered = list.filter(item =>
        (item.title || "").toLowerCase().includes(value) ||
        (item.desc || "").toLowerCase().includes(value)
    );

    if(!filtered.length){
        results.innerHTML = `<div class="result">${translations[currentLang].noResults}</div>`;
        return;
    }

    results.innerHTML = filtered.map(item => `
        <div class="result">
            <a href="${item.link}" target="_blank">${item.title}</a>
            <p>${item.desc}</p>
        </div>
    `).join("");
});

// 📜 HISTORY
function saveToHistory(query){
    if(!query) return;

    let history = JSON.parse(localStorage.getItem("history")) || [];

    if(history.includes(query)) return;

    history.unshift(query);

    if(history.length > 500) history.pop();

    localStorage.setItem("history", JSON.stringify(history));
}

function showHistory(){
    const box = document.getElementById("historyList");
    let history = JSON.parse(localStorage.getItem("history")) || [];

    if(!history.length){
        box.innerHTML = "No history";
        return;
    }

    box.innerHTML = history.map(h => `
        <div class="result" onclick="useHistory('${h}')">${h}</div>
    `).join("");
}

function useHistory(text){
    document.getElementById("search").value = text;
    document.getElementById("settingsBox").style.display = "none";
}

function clearHistory(){
    localStorage.removeItem("history");
    log("cleared history");
    showHistory();
}

function log(text){
    const logs = document.getElementById("consoleLogs");
    if(!logs) return;

    const time = new Date().toLocaleTimeString();
    logs.innerHTML += `<div>[${time}] ${text}</div>`;
    logs.scrollTop = logs.scrollHeight;
}

setInterval(()=>{
    log("system running...");
},1000);

function handleCommand(e){
    if(e.key !== "Enter") return;

    const input = e.target.value;
    e.target.value = "";

    if(!input.startsWith("/")){
        log("❌ wrong format. example: /command");
        return;
    }

    if(input === "/help"){
        log("komendy: /help, /clear, /search tekst");
    }
    else if(input === "/clear"){
        document.getElementById("consoleLogs").innerHTML = "";
    }
    else if(input.startsWith("/search")){
        const text = input.replace("/search ","");
        document.getElementById("search").value = text;
        log("search: " + text);
    }
    else{
        log("unknown command");
    }
};
